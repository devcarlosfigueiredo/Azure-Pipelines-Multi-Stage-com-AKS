# =============================================================================
# Helm Values — Base (overridden per environment)
# =============================================================================

replicaCount: 2

image:
  repository: ""          # Set by pipeline: acr.azurecr.io/myapp
  tag: ""                 # Set by pipeline: $(Build.BuildId)
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP
  port: 80
  targetPort: 8080

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: myapp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: myapp-tls
      hosts:
        - myapp.example.com

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ── Autoscaling ───────────────────────────────────────────────────────────────
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# ── Probes ────────────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 15
  periodSeconds: 20
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

# ── Environment variables ─────────────────────────────────────────────────────
env:
  ENVIRONMENT: base
  PORT: "8080"

# ── Secrets from Key Vault (CSI driver) ──────────────────────────────────────
keyVault:
  enabled: true
  vaultName: ""           # Set per environment
  tenantId: ""            # Set per environment
  secrets:
    - secretName: app-db-connection-string
      envVar: DATABASE_URL
    - secretName: app-secret-key
      envVar: SECRET_KEY

# ── Pod configuration ─────────────────────────────────────────────────────────
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/path: "/metrics"
  prometheus.io/port: "8080"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  fsGroup: 1001

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

# ── Node affinity / topology ──────────────────────────────────────────────────
nodeSelector:
  nodepool-type: app

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [myapp]
          topologyKey: kubernetes.io/hostname

# ── ServiceAccount ────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  annotations: {}
  name: ""
