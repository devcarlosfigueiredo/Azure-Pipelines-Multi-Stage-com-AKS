# =============================================================================
# Template: build-steps.yml
# Reusable steps: Python setup → lint → test → coverage
# =============================================================================

parameters:
  - name: pythonVersion
    type: string
    default: "3.12"
  - name: runTests
    type: boolean
    default: true
  - name: testResultsDir
    type: string
    default: "$(Agent.TempDirectory)/test-results"

steps:

  # ── Python setup ────────────────────────────────────────────────────────────
  - task: UsePythonVersion@0
    displayName: "Use Python ${{ parameters.pythonVersion }}"
    inputs:
      versionSpec: "${{ parameters.pythonVersion }}"
      addToPath: true

  - script: |
      python -m pip install --upgrade pip
      pip install -r requirements.txt
    displayName: "Install dependencies"

  # ── Lint with flake8 ────────────────────────────────────────────────────────
  - script: |
      echo "Running flake8 lint..."
      flake8 app/ tests/ \
        --max-line-length=120 \
        --exclude=__pycache__,.git \
        --format=default
      echo "✅ Lint passed"
    displayName: "Flake8 lint"

  # ── Tests + Coverage ────────────────────────────────────────────────────────
  - ${{ if parameters.runTests }}:
    - script: |
        mkdir -p "${{ parameters.testResultsDir }}"
        pytest tests/ \
          --tb=short \
          --cov=app \
          --cov-report=xml:"${{ parameters.testResultsDir }}/coverage.xml" \
          --cov-report=html:"${{ parameters.testResultsDir }}/coverage-html" \
          --junitxml="${{ parameters.testResultsDir }}/junit.xml" \
          -v
      displayName: "Pytest + Coverage"
      env:
        ENVIRONMENT: test

    # ── Publish test results ────────────────────────────────────────────────
    - task: PublishTestResults@2
      displayName: "Publish test results"
      condition: always()
      inputs:
        testResultsFormat: JUnit
        testResultsFiles: "${{ parameters.testResultsDir }}/junit.xml"
        failTaskOnFailedTests: true
        testRunTitle: "Unit Tests — Python ${{ parameters.pythonVersion }}"

    # ── Publish coverage ────────────────────────────────────────────────────
    - task: PublishCodeCoverageResults@2
      displayName: "Publish coverage report"
      condition: always()
      inputs:
        codeCoverageTool: Cobertura
        summaryFileLocation: "${{ parameters.testResultsDir }}/coverage.xml"
        reportDirectory: "${{ parameters.testResultsDir }}/coverage-html"
        failIfCoverageEmpty: false
